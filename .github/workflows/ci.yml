name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: fmt + clippy + tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: linux-app
    steps:
      - uses: actions/checkout@v4

      # System libraries for the Tauri GUI crate (the headless core needs none).
      - name: Install GUI system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: linux-app

      # The local gate: fmt --check, clippy -D warnings, tests (core + GUI).
      - name: Run check.sh
        run: ./scripts/check.sh
