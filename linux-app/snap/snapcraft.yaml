name: poe2obsidian
base: core24
version: '0.11.0'
icon: snap/local/poe2obsidian.png
website: https://github.com/selectdimensions/ravenvault-chrome
source-code: https://github.com/selectdimensions/ravenvault-chrome
issues: https://github.com/selectdimensions/ravenvault-chrome/issues
license: MIT
summary: Export your Poe.com chats to Obsidian as Markdown
description: |
  Poe2Obsidian is the local companion app for the Poe2Obsidian browser
  extension. It receives Poe.com conversations captured by the extension over a
  localhost WebSocket (127.0.0.1:53122), converts them to clean Markdown,
  downloads images, and saves them into your Obsidian vault — one chat or your
  whole history. It can optionally ingest each conversation into MemPalace (LLM
  long-term memory).

  Open the tray icon to choose your vault folder. Based on the open-source
  RavenVault extension (MIT).

grade: stable

# Classic confinement is required: the app writes to an arbitrary, user-chosen
# Obsidian vault — which may be a hidden folder or live outside $HOME — and does
# so continuously in the background. No auto-connecting strict interface
# (home/removable-media/personal-files) covers that case, so we ship classic and
# justify it at review time. (A strict alternative limited to a visible folder
# under $HOME is noted in docs/SNAP.md.)
confinement: classic

platforms:
  amd64:

apps:
  poe2obsidian:
    # The launcher wires up the bundled GTK/WebKit runtime before exec'ing the
    # Tauri binary (classic snaps don't get the gnome extension's wiring).
    command-chain: [bin/launcher]
    command: bin/ravenvault-gui
    desktop: usr/share/applications/poe2obsidian.desktop

parts:
  poe2obsidian:
    plugin: rust
    source: .
    # Build only the GUI workspace member (it depends on the core crate).
    rust-path: [gui]
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libgtk-3-dev
      - pkg-config
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libgtk-3-0

  runtime:
    plugin: dump
    source: snap/local
    organize:
      launcher: bin/launcher
      poe2obsidian.desktop: usr/share/applications/poe2obsidian.desktop
      poe2obsidian.png: usr/share/icons/hicolor/128x128/apps/poe2obsidian.png
    stage:
      - bin/launcher
      - usr/share/applications/poe2obsidian.desktop
      - usr/share/icons/hicolor/128x128/apps/poe2obsidian.png
